<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" fill="url(#bg)" rx="12"/>
  <text x="32" y="46" font-family="'Noto Naskh Arabic','Traditional Arabic',Arial,sans-serif"
    font-size="44" font-weight="900" fill="white" text-anchor="middle" filter="url(#glow)">ك</text>
</svg>
