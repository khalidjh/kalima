<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tileGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 3D effect for tiles -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="grayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1d5db"/>
      <stop offset="100%" style="stop-color:#9ca3af"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bgGrad)" rx="32"/>

  <!-- Subtle green ambient glow behind Arabic text -->
  <ellipse cx="250" cy="185" rx="160" ry="80" fill="#22c55e" opacity="0.08"/>

  <!-- Arabic text كلمة -->
  <text
    x="250"
    y="220"
    font-family="'Noto Naskh Arabic', 'Traditional Arabic', 'Arial', sans-serif"
    font-size="148"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    dominant-baseline="auto"
    filter="url(#glow)"
    letter-spacing="-2"
  >كلمة</text>

  <!-- Wordle tiles row -->
  <!-- 5 tiles, each 64x64, gap 10, total = 5*64 + 4*10 = 360, centered = 70 -->
  <!-- Green -->
  <rect x="70" y="270" width="64" height="64" rx="10" fill="url(#greenGrad)" filter="url(#tileGlow)"/>
  <rect x="70" y="270" width="64" height="10" rx="10" fill="white" opacity="0.2"/>

  <!-- Gray -->
  <rect x="144" y="270" width="64" height="64" rx="10" fill="url(#grayGrad)" filter="url(#softGlow)"/>
  <rect x="144" y="270" width="64" height="10" rx="10" fill="white" opacity="0.2"/>

  <!-- Yellow -->
  <rect x="218" y="270" width="64" height="64" rx="10" fill="url(#yellowGrad)" filter="url(#tileGlow)"/>
  <rect x="218" y="270" width="64" height="10" rx="10" fill="white" opacity="0.2"/>

  <!-- Gray -->
  <rect x="292" y="270" width="64" height="64" rx="10" fill="url(#grayGrad)" filter="url(#softGlow)"/>
  <rect x="292" y="270" width="64" height="10" rx="10" fill="white" opacity="0.2"/>

  <!-- Green -->
  <rect x="366" y="270" width="64" height="64" rx="10" fill="url(#greenGrad)" filter="url(#tileGlow)"/>
  <rect x="366" y="270" width="64" height="10" rx="10" fill="white" opacity="0.2"/>

  <!-- KALIMA text -->
  <text
    x="250"
    y="405"
    font-family="'Arial', 'Helvetica', sans-serif"
    font-size="52"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="12"
    filter="url(#softGlow)"
  >KALIMA</text>
</svg>
